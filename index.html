<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOÜ Akıllı Sera İzleme Paneli</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f3;
            margin: 0;
            padding: 20px;
            text-align: center;
            color: #333;
        }
        .header {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card h3 {
            margin: 0 0 10px 0;
            color: #666;
            font-size: 1.1rem;
        }
        .value {
            font-size: 2.2rem;
            font-weight: bold;
            color: #11998e;
        }
        .unit {
            font-size: 1.2rem;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>KOÜ ENERJİ SİSTEMLERİ MÜHENDİSLİĞİ</h2>
        <p>☀️ Akıllı Sera IoT İzleme Paneli Gadaşım ☀️</p>
    </div>

    <div class="grid">
        <div class="card">
            <h3>🌡️ Hava Sıcaklığı</h3>
            <div class="value" id="temp">-- <span class="unit">°C</span></div>
        </div>
        <div class="card">
            <h3>💧 Hava Nemi</h3>
            <div class="value" id="humidity">-- <span class="unit">%</span></div>
        </div>
        <div class="card">
            <h3>🌱 Toprak Nemi</h3>
            <div class="value" id="soil">-- <span class="unit">Ham</span></div>
        </div>
        <div class="card">
            <h3>☀️ Panel Üretimi</h3>
            <div class="value" id="voltage">-- <span class="unit">V</span></div>
        </div>
    </div>

    <script>
        // Buraya bir sonraki adımda ücretsiz bulut veritabanından (ThingSpeak) 
        // verileri canlı çekme kodunu ekleyeceğiz gadaşım!
    </script>
</body>
</html>
